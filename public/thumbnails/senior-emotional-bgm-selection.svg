      <path d="M -16,-62 L -16, -30 M -8,-67 L -8, -30 M 0,-68 L 0, -30 M 8,-67 L 8, -30 M 16,-62 L 16, -30" stroke="#ffffff" stroke-width="2" opacity="0.5" />
